<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E14 - Carga de Formularios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1em;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="file"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="file"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-help {
            color: #999;
            font-size: 0.85em;
            margin-top: 3px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-label {
            display: block;
            padding: 40px;
            background: #f8f9ff;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input-label:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .file-input-label.dragover {
            background: #e8ecff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .file-input-label i {
            font-size: 2em;
            margin-bottom: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            color: #667eea;
            font-weight: 600;
            margin-top: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .alert.show {
            display: flex;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-box {
            background: #f8f9ff;
            border: 1px solid #e0e7ff;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e7ff;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #667eea;
        }

        .result-value {
            color: #333;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🗳️ Carga de Formularios E-14</h1>
            <p class="subtitle">Auditoría ciudadana de elecciones</p>
        </header>

        <!-- Alert -->
        <div class="alert" id="alert">
            <span class="alert-message"></span>
        </div>

        <!-- Form -->
        <form id="uploadForm">
            <!-- PDF Upload -->
            <div class="form-section">
                <h2>📄 Formulario E-14</h2>
                <div class="form-group">
                    <div class="file-input-wrapper">
                        <label for="pdfFile" class="file-input-label" id="fileLabel" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                            <div>📁</div>
                            <div>Arrastra tu PDF aquí o haz clic para seleccionar</div>
                            <div class="file-name" id="fileName"></div>
                        </label>
                        <input type="file" id="pdfFile" accept=".pdf" onchange="handleFileSelect(event)">
                    </div>
                    <div class="input-help">Máximo 10 MB</div>
                </div>
            </div>

            <!-- Location Info -->
            <div class="form-section">
                <h2>📍 Ubicación Electoral</h2>
                
                <div class="form-group">
                    <label for="deptCode">Código de Departamento</label>
                    <input type="text" id="deptCode" name="dept_code" placeholder="ej: 01 (Antioquia)" maxlength="2" required>
                    <div class="input-help">Código de 2 dígitos</div>
                </div>

                <div class="form-group">
                    <label for="muniCode">Código de Municipio</label>
                    <input type="text" id="muniCode" name="muni_code" placeholder="ej: 001 (Medellín)" maxlength="3" required>
                    <div class="input-help">Código de 3 dígitos</div>
                </div>

                <div class="form-group">
                    <label for="zoneCode">Código de Zona</label>
                    <input type="text" id="zoneCode" name="zone_code" placeholder="ej: 001" maxlength="3" required>
                    <div class="input-help">Código de 3 dígitos</div>
                </div>

                <div class="form-group">
                    <label for="stationCode">Código de Puesto</label>
                    <input type="text" id="stationCode" name="station_code" placeholder="ej: 01" maxlength="2" required>
                    <div class="input-help">Código de 2 dígitos</div>
                </div>

                <div class="form-group">
                    <label for="tableNumber">Número de Mesa</label>
                    <input type="text" id="tableNumber" name="table_number" placeholder="ej: 001" maxlength="3" required>
                    <div class="input-help">Código de 3 dígitos</div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="spinner" id="spinner"></span>
                    Cargar Formulario
                </button>
                <button type="reset" class="btn-reset">Limpiar</button>
            </div>
        </form>

        <!-- Result -->
        <div class="result-box" id="resultBox">
            <div class="result-item">
                <span class="result-label">Form ID:</span>
                <span class="result-value" id="resultFormId">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Serial:</span>
                <span class="result-value" id="resultSerial">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Tamaño:</span>
                <span class="result-value" id="resultSize">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Hash SHA-256:</span>
                <span class="result-value" id="resultHash">-</span>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('pdfFile');
        const fileLabel = document.getElementById('fileLabel');
        const fileName = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const alertBox = document.getElementById('alert');
        const resultBox = document.getElementById('resultBox');

        // File input handlers
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                updateFileName(file);
            }
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.stopPropagation();
            fileLabel.classList.add('dragover');
        }

        function handleDragLeave(event) {
            event.preventDefault();
            event.stopPropagation();
            fileLabel.classList.remove('dragover');
        }

        function handleDrop(event) {
            event.preventDefault();
            event.stopPropagation();
            fileLabel.classList.remove('dragover');
            
            const files = event.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                updateFileName(files[0]);
            }
        }

        function updateFileName(file) {
            if (file.type !== 'application/pdf') {
                showAlert('Solo se aceptan archivos PDF', 'error');
                fileInput.value = '';
                fileName.textContent = '';
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showAlert('El archivo es muy grande (máximo 10 MB)', 'error');
                fileInput.value = '';
                fileName.textContent = '';
                return;
            }
            fileName.textContent = `✅ ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!fileInput.files.length) {
                showAlert('Por favor selecciona un PDF', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('dept_code', document.getElementById('deptCode').value.trim());
            formData.append('muni_code', document.getElementById('muniCode').value.trim().padStart(3, '0'));
            formData.append('zone_code', document.getElementById('zoneCode').value.trim().padStart(3, '0'));
            formData.append('station_code', document.getElementById('stationCode').value.trim().padStart(2, '0'));
            formData.append('table_number', document.getElementById('tableNumber').value.trim().padStart(3, '0'));

            submitBtn.disabled = true;
            spinner.style.display = 'inline-block';
            resultBox.classList.remove('show');

            try {
                const response = await fetch('/upload-pdf', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(`✅ Formulario cargado exitosamente (ID: ${data.form_id})`, 'success');
                    showResult(data);
                    form.reset();
                    fileName.textContent = '';
                    fileLabel.classList.remove('dragover');
                } else {
                    showAlert(`Error: ${data.message}`, 'error');
                }
            } catch (error) {
                showAlert(`Error de conexión: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
            }
        });

        function showAlert(message, type) {
            alertBox.querySelector('.alert-message').textContent = message;
            alertBox.className = `alert show ${type}`;
            
            if (type !== 'error') {
                setTimeout(() => {
                    alertBox.classList.remove('show');
                }, 5000);
            }
        }

        function showResult(data) {
            document.getElementById('resultFormId').textContent = data.form_id;
            document.getElementById('resultSerial').textContent = data.details.form_serial;
            document.getElementById('resultSize').textContent = `${data.details.file_size_mb} MB`;
            document.getElementById('resultHash').textContent = data.details.file_hash.substring(0, 32) + '...';
            resultBox.classList.add('show');
        }
    </script>
</body>
</html>
