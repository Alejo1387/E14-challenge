# E14 Challenge — entorno de desarrollo con Docker
#
# Uso rápido (desde la raíz del repo):
#   docker compose build
#   docker compose up -d
#   docker compose exec backend python scripts/setup_db.py
#   docker compose exec backend python scripts/seed_data.py
#
# Ver guía: backend/DOCKER.md

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: e14-challenge-backend:latest
    container_name: e14-backend
    working_dir: /app
    volumes:
      # Persisten PDFs, SQLite y archivos procesados en tu disco
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    environment:
      PYTHONUNBUFFERED: "1"
    # Contenedor activo para ejecutar scripts con docker compose exec
    command: ["sleep", "infinity"]
    restart: unless-stopped

